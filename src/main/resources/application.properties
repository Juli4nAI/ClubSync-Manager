spring.application.name=club-manager

# Conexión a la base de datos MySQL
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/club_manager
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

spring.jpa.hibernate.ddl-auto=update

# Opcional: Esto te mostrará en la terminal de VS Code el SQL que Spring escribe por detrás
spring.jpa.show-sql=true

mercadopago.access-token=${MP_ACCESS_TOKEN}

# 1. Le pasamos la llave gratis de Groq
spring.ai.openai.api-key=${GROQ_API_KEY}

# 2. El truco maestro: Le cambiamos la URL a Spring Boot para que no vaya a OpenAI
spring.ai.openai.base-url=https://api.groq.com/openai

# 3. Le decimos que use Llama 3 (uno de los mejores modelos open-source actuales)
spring.ai.openai.chat.options.model=openai/gpt-oss-120b
